<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>저녁떨이 - 오프라인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #f5f5f5; color: #1A1A1A;
            padding: 24px;
        }
        .container {
            max-width: 360px; text-align: center;
            background: #fff; padding: 40px 32px; border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .icon { font-size: 3.5rem; margin-bottom: 20px; }
        h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
        p { font-size: 0.95rem; color: #888; margin-bottom: 28px; line-height: 1.5; }
        button {
            padding: 14px 32px; background: #FF7A00; color: #fff;
            border: none; border-radius: 12px; font-size: 1rem;
            font-weight: 700; cursor: pointer; font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>인터넷 연결을 확인해주세요</h1>
        <p>현재 오프라인 상태입니다.<br>네트워크 연결 후 다시 시도해주세요.</p>
        <button onclick="window.location.reload()">다시 시도</button>
    </div>
</body>
</html>
