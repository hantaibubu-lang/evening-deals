<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9E40"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <!-- Sun (sunset) -->
  <circle cx="256" cy="340" r="70" fill="url(#sunGrad)" opacity="0.5"/>
  <!-- Horizon line -->
  <rect x="60" y="330" width="392" height="4" rx="2" fill="white" opacity="0.3"/>
  <!-- Shopping bag -->
  <g transform="translate(256, 230)" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bag body -->
    <rect x="-90" y="-20" width="180" height="150" rx="16" fill="white" fill-opacity="0.15"/>
    <rect x="-90" y="-20" width="180" height="150" rx="16"/>
    <!-- Bag handles -->
    <path d="M-40,-20 C-40,-70 40,-70 40,-20"/>
  </g>
  <!-- Discount % inside bag -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="72" fill="white">%</text>
  <!-- Clock indicator (small) -->
  <g transform="translate(340, 160)">
    <circle r="36" fill="white"/>
    <circle r="36" fill="none" stroke="#FF7A00" stroke-width="4"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-18" stroke="#FF7A00" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14" y2="0" stroke="#FF7A00" stroke-width="4" stroke-linecap="round"/>
    <circle r="4" fill="#FF7A00"/>
  </g>
</svg>
