<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF5722"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg2)"/>
  <!-- Plate (big circle) -->
  <circle cx="240" cy="280" r="130" fill="white" opacity="0.2"/>
  <circle cx="240" cy="280" r="110" fill="white" opacity="0.15"/>
  <!-- Food on plate (simple bowl shape) -->
  <g transform="translate(240, 260)">
    <!-- Steam lines -->
    <path d="M-30,-80 C-30,-100 -20,-95 -20,-80" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <path d="M0,-90 C0,-110 10,-105 10,-90" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <path d="M30,-80 C30,-100 40,-95 40,-80" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <!-- Bowl -->
    <path d="M-70,0 Q-70,60 0,70 Q70,60 70,0 Z" fill="white" stroke="none"/>
    <!-- Bowl rim -->
    <ellipse cx="0" cy="0" rx="75" ry="14" fill="white"/>
  </g>
  <!-- Discount tag (top-right) -->
  <g transform="translate(380, 130)">
    <circle r="52" fill="#FFD93D"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="32" fill="#FF5722">70%</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#FF5722">OFF</text>
  </g>
  <!-- Timer icon (bottom-left) -->
  <g transform="translate(120, 130)">
    <circle r="40" fill="white" opacity="0.25"/>
    <!-- Clock face -->
    <circle r="28" fill="none" stroke="white" stroke-width="5"/>
    <!-- Top nub -->
    <line x1="0" y1="-28" x2="0" y2="-36" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-16" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="12" y2="8" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle r="3" fill="white"/>
  </g>
</svg>
