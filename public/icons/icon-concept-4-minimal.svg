<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9E40"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg4)"/>
  <!-- Big "저" character as logo mark -->
  <text x="256" y="320" text-anchor="middle" font-family="'Noto Sans KR', Arial, sans-serif" font-weight="900" font-size="280" fill="white" opacity="0.95">저</text>
  <!-- Small sunset line at bottom -->
  <line x1="100" y1="420" x2="412" y2="420" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <!-- Small clock badge -->
  <g transform="translate(390, 135)">
    <circle r="40" fill="white"/>
    <circle r="28" fill="none" stroke="#FF7A00" stroke-width="4"/>
    <line x1="0" y1="2" x2="0" y2="-14" stroke="#FF7A00" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="12" y2="8" stroke="#FF7A00" stroke-width="3" stroke-linecap="round"/>
    <circle r="3" fill="#FF7A00"/>
  </g>
</svg>
