name: Uptime Monitor

on:
  schedule:
    # 5분마다 실행 (GitHub Actions 최소 간격)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check API health
        id: health
        run: |
          HEALTH_URL="${{ vars.SITE_URL || 'https://evening-deals.vercel.app' }}/api/health"
          echo "Checking: $HEALTH_URL"

          HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            "$HEALTH_URL")

          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/health_response.json | jq . 2>/dev/null || cat /tmp/health_response.json

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "status=down" >> "$GITHUB_OUTPUT"
            echo "::error::Health check failed with HTTP $HTTP_CODE"
          else
            echo "status=up" >> "$GITHUB_OUTPUT"
            echo "Health check passed"
          fi

      - name: Check main page
        id: page
        run: |
          PAGE_URL="${{ vars.SITE_URL || 'https://evening-deals.vercel.app' }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            "$PAGE_URL")

          echo "Main page HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Main page returned HTTP $HTTP_CODE"
          fi

      - name: Create issue on failure
        if: steps.health.outputs.status == 'down'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Uptime] 서비스 다운 감지 - ${new Date().toISOString().slice(0, 16)}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-alert',
              per_page: 1,
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `여전히 다운 상태입니다. (${new Date().toISOString()})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  '## 서비스 다운 감지',
                  '',
                  `- **시각**: ${new Date().toISOString()}`,
                  `- **대상**: /api/health`,
                  `- **워크플로우**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  '자동 생성된 알림입니다. 서비스 정상화 후 이슈를 닫아주세요.',
                ].join('\n'),
                labels: ['uptime-alert', 'bug'],
              });
            }
